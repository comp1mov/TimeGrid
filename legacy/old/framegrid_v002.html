<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FRAMEGRID</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== MAIN LAYOUT ===== */
    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-color, #0a0a0a);
    }

    /* ===== TOP METADATA BAR ===== */
    .metadata-bar {
      height: 32px;
      min-height: 32px;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      font-size: 11px;
      letter-spacing: 0.04em;
      z-index: 10;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .metadata-bar.hidden {
      transform: translateY(-100%);
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }

    .metadata-logo {
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .metadata-logo::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #35f2a3;
      border-radius: 1px;
    }

    .metadata-item {
      color: rgba(255,255,255,0.6);
    }

    .metadata-item span {
      color: rgba(255,255,255,0.9);
    }

    .metadata-spacer {
      flex: 1;
    }

    .menu-toggle {
      width: 28px;
      height: 28px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: all 0.15s ease;
    }

    .menu-toggle:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
    }

    .menu-toggle.active {
      background: rgba(53, 242, 163, 0.2);
      border-color: #35f2a3;
    }

    .menu-toggle span {
      width: 12px;
      height: 1px;
      background: rgba(255,255,255,0.8);
    }

    /* ===== CANVAS AREA ===== */
    .canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    .canvas-area:active {
      cursor: grabbing;
    }

    .canvas-area.has-menu {
      margin-right: 260px;
    }

    .canvas-inner {
      position: absolute;
      transform-origin: 0 0;
      display: flex;
      flex-direction: column;
    }

    /* ===== GRID ===== */
    .frames-grid {
      display: grid;
      gap: var(--grid-gap, 2px);
      background: transparent;
    }

    .frame-item {
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .frame-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: var(--video-aspect, 16/9);
      background: #111;
      overflow: hidden;
    }

    .frame-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .frame-meta {
      height: var(--meta-height, 24px);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--meta-font-size, 10px);
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.85);
      font-variant-numeric: tabular-nums;
    }

    .frame-meta.hidden {
      display: none;
    }

    /* ===== DROP ZONE ===== */
    .drop-zone {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--bg-color, #0a0a0a);
      z-index: 5;
      transition: opacity 0.2s ease;
    }

    .drop-zone.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .drop-zone-icon {
      width: 80px;
      height: 80px;
      border: 2px dashed rgba(255,255,255,0.3);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: rgba(255,255,255,0.4);
    }

    .drop-zone-text {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }

    .drop-zone-btn {
      padding: 10px 24px;
      background: #35f2a3;
      color: #000;
      border: none;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .drop-zone-btn:hover {
      background: #4df7b5;
    }

    .drop-zone.drag-over {
      background: rgba(53, 242, 163, 0.1);
    }

    .drop-zone.drag-over .drop-zone-icon {
      border-color: #35f2a3;
      color: #35f2a3;
    }

    /* ===== SIDE MENU ===== */
    .side-menu {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 260px;
      background: rgba(0,0,0,0.98);
      border-left: 1px solid rgba(255,255,255,0.15);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .side-menu.open {
      transform: translateX(0);
    }

    .side-menu-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-close-btn {
      width: 24px;
      height: 24px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .menu-close-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
    }

    .menu-section {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .menu-section-title {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }

    .menu-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .menu-row:last-child {
      margin-bottom: 0;
    }

    .menu-label {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }

    .menu-input {
      width: 70px;
      padding: 6px 8px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2px;
      color: #fff;
      font-size: 11px;
      text-align: center;
    }

    .menu-input:focus {
      outline: none;
      border-color: #35f2a3;
    }

    .menu-select {
      padding: 6px 8px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2px;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
    }

    .menu-select:focus {
      outline: none;
      border-color: #35f2a3;
    }

    .menu-toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      background: #333;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .menu-toggle-switch.active {
      background: #35f2a3;
    }

    .menu-toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .menu-toggle-switch.active::after {
      transform: translateX(16px);
    }

    .menu-color-input {
      width: 36px;
      height: 28px;
      padding: 2px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2px;
      cursor: pointer;
    }

    .menu-color-input::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .menu-color-input::-webkit-color-swatch {
      border: none;
      border-radius: 1px;
    }

    .menu-slider {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #333;
      border-radius: 2px;
      cursor: pointer;
    }

    .menu-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #35f2a3;
      border-radius: 50%;
      cursor: pointer;
    }

    .menu-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #35f2a3;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .menu-slider-value {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      min-width: 28px;
      text-align: right;
    }

    .menu-btn {
      width: 100%;
      padding: 10px 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 2px;
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-top: 8px;
    }

    .menu-btn:first-of-type {
      margin-top: 0;
    }

    .menu-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
    }

    .menu-btn.primary {
      background: #35f2a3;
      border-color: #35f2a3;
      color: #000;
    }

    .menu-btn.primary:hover {
      background: #4df7b5;
    }

    /* ===== MOBILE MENU BUTTON ===== */
    .mobile-menu-btn {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 2px;
      z-index: 25;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
    }

    .mobile-menu-btn span {
      width: 16px;
      height: 2px;
      background: #fff;
    }

    /* ===== PROGRESS ===== */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.1);
      z-index: 30;
      display: none;
    }

    .progress-bar.visible {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: #35f2a3;
      width: 0%;
      transition: width 0.1s ease;
    }

    /* ===== LOADING ===== */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 50;
    }

    .loading-overlay.visible {
      display: flex;
    }

    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.1em;
    }

    .loading-progress {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex;
      }

      .metadata-bar {
        height: 28px;
        min-height: 28px;
        font-size: 10px;
        padding: 0 8px;
        gap: 8px;
      }

      .side-menu {
        width: 300px;
      }

      .canvas-area.has-menu {
        margin-right: 0;
      }
    }

    @media (max-width: 480px) {
      .side-menu {
        width: 100%;
      }

      .metadata-item.hide-mobile {
        display: none;
      }
    }

    /* ===== HIDDEN VIDEO ===== */
    #videoElement {
      display: none;
    }

    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Metadata Bar -->
    <div class="metadata-bar" id="metadataBar">
      <div class="metadata-logo">FRAMEGRID</div>
      <div class="metadata-item" id="metaFilename">No file loaded</div>
      <div class="metadata-item hide-mobile" id="metaResolution"></div>
      <div class="metadata-item hide-mobile" id="metaFps"></div>
      <div class="metadata-item" id="metaDuration"></div>
      <div class="metadata-item hide-mobile" id="metaDate"></div>
      <div class="metadata-item hide-mobile" id="metaMode"></div>
      <div class="metadata-spacer"></div>
      <button class="menu-toggle" id="menuToggleBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-inner" id="canvasInner">
        <div class="frames-grid" id="framesGrid"></div>
      </div>

      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">▶</div>
        <div class="drop-zone-text">
          Drop video file here<br>
          <span style="font-size: 11px; opacity: 0.6;">or click to browse</span>
        </div>
        <button class="drop-zone-btn" id="browseBtn">SELECT VIDEO</button>
      </div>

      <!-- Mobile Menu Button -->
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Side Menu -->
    <div class="side-menu" id="sideMenu">
      <div class="side-menu-header">
        <span>Settings</span>
        <button class="menu-close-btn" id="menuCloseBtn">✕</button>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">Frame Selection</div>
        <div class="menu-row">
          <span class="menu-label">Mode</span>
          <select class="menu-select" id="selectionMode">
            <option value="count">Fixed Count</option>
            <option value="seconds">Every N Sec</option>
            <option value="frames">Every N Frames</option>
          </select>
        </div>
        <div class="menu-row" id="countRow">
          <span class="menu-label">Frame Count</span>
          <input type="number" class="menu-input" id="frameCount" value="24" min="1" max="200">
        </div>
        <div class="menu-row" id="intervalRow" style="display:none;">
          <span class="menu-label" id="intervalLabel">Interval</span>
          <input type="number" class="menu-input" id="intervalValue" value="1" min="1">
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">Grid Layout</div>
        <div class="menu-row">
          <span class="menu-label">Columns</span>
          <input type="number" class="menu-input" id="gridCols" value="6" min="1" max="20">
        </div>
        <div class="menu-row">
          <span class="menu-label">Auto-fit to screen</span>
          <div class="menu-toggle-switch active" id="toggleAutoFit"></div>
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">Display</div>
        <div class="menu-row">
          <span class="menu-label">Show Metadata Bar</span>
          <div class="menu-toggle-switch active" id="toggleMetadata"></div>
        </div>
        <div class="menu-row">
          <span class="menu-label">Show Timecode</span>
          <div class="menu-toggle-switch active" id="toggleTimecode"></div>
        </div>
        <div class="menu-row">
          <span class="menu-label">Timecode Size</span>
          <input type="range" class="menu-slider" id="fontSizeSlider" min="8" max="18" value="11">
          <span class="menu-slider-value" id="fontSizeValue">11px</span>
        </div>
        <div class="menu-row">
          <span class="menu-label">Background</span>
          <input type="color" class="menu-color-input" id="bgColor" value="#0a0a0a">
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">Actions</div>
        <button class="menu-btn primary" id="generateBtn">Generate Grid</button>
        <button class="menu-btn" id="fitScreenBtn">Fit to Screen</button>
        <button class="menu-btn" id="exportPngBtn">Export PNG (Full)</button>
        <button class="menu-btn" id="exportJpgBtn">Export JPEG (Small)</button>
        <button class="menu-btn" id="newVideoBtn">Load New Video</button>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-text">Processing frames...</div>
      <div class="loading-progress" id="loadingProgress">0 / 0</div>
    </div>
  </div>

  <!-- Hidden Elements -->
  <video id="videoElement" crossorigin="anonymous"></video>
  <input type="file" id="fileInput" accept="video/*">
  <canvas id="captureCanvas" style="display:none;"></canvas>

  <script>
    (function() {
      'use strict';

      // ===== STATE =====
      const state = {
        videoFile: null,
        videoUrl: null,
        videoDuration: 0,
        videoWidth: 0,
        videoHeight: 0,
        videoFps: 30,
        videoDate: null,
        frames: [],
        frameCount: 24,
        gridCols: 6,
        selectionMode: 'count',
        intervalValue: 1,
        showMetadata: true,
        showTimecode: true,
        autoFit: true,
        bgColor: '#0a0a0a',
        fontSize: 11,
        // Pan & Zoom
        scale: 1,
        panX: 0,
        panY: 0,
        isPanning: false,
        startPanX: 0,
        startPanY: 0,
        startMouseX: 0,
        startMouseY: 0,
        // Menu
        menuOpen: false
      };

      // ===== DOM ELEMENTS =====
      const app = document.getElementById('app');
      const metadataBar = document.getElementById('metadataBar');
      const canvasArea = document.getElementById('canvasArea');
      const canvasInner = document.getElementById('canvasInner');
      const framesGrid = document.getElementById('framesGrid');
      const dropZone = document.getElementById('dropZone');
      const sideMenu = document.getElementById('sideMenu');
      const menuToggleBtn = document.getElementById('menuToggleBtn');
      const menuCloseBtn = document.getElementById('menuCloseBtn');
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const loadingProgress = document.getElementById('loadingProgress');
      const videoElement = document.getElementById('videoElement');
      const fileInput = document.getElementById('fileInput');
      const captureCanvas = document.getElementById('captureCanvas');
      const captureCtx = captureCanvas.getContext('2d');

      // Menu inputs
      const gridColsInput = document.getElementById('gridCols');
      const selectionModeSelect = document.getElementById('selectionMode');
      const frameCountInput = document.getElementById('frameCount');
      const intervalValueInput = document.getElementById('intervalValue');
      const countRow = document.getElementById('countRow');
      const intervalRow = document.getElementById('intervalRow');
      const intervalLabel = document.getElementById('intervalLabel');
      const toggleMetadata = document.getElementById('toggleMetadata');
      const toggleTimecode = document.getElementById('toggleTimecode');
      const toggleAutoFit = document.getElementById('toggleAutoFit');
      const fontSizeSlider = document.getElementById('fontSizeSlider');
      const fontSizeValue = document.getElementById('fontSizeValue');
      const bgColorInput = document.getElementById('bgColor');
      const generateBtn = document.getElementById('generateBtn');
      const fitScreenBtn = document.getElementById('fitScreenBtn');
      const exportPngBtn = document.getElementById('exportPngBtn');
      const exportJpgBtn = document.getElementById('exportJpgBtn');
      const newVideoBtn = document.getElementById('newVideoBtn');
      const browseBtn = document.getElementById('browseBtn');

      // Metadata display
      const metaFilename = document.getElementById('metaFilename');
      const metaResolution = document.getElementById('metaResolution');
      const metaFps = document.getElementById('metaFps');
      const metaDuration = document.getElementById('metaDuration');
      const metaDate = document.getElementById('metaDate');
      const metaMode = document.getElementById('metaMode');

      // ===== MENU FUNCTIONS =====
      function openMenu() {
        state.menuOpen = true;
        sideMenu.classList.add('open');
        menuToggleBtn.classList.add('active');
        if (window.innerWidth > 768) {
          canvasArea.classList.add('has-menu');
        }
      }

      function closeMenu() {
        state.menuOpen = false;
        sideMenu.classList.remove('open');
        menuToggleBtn.classList.remove('active');
        canvasArea.classList.remove('has-menu');
      }

      function toggleMenu() {
        if (state.menuOpen) {
          closeMenu();
        } else {
          openMenu();
        }
      }

      menuToggleBtn.addEventListener('click', toggleMenu);
      menuCloseBtn.addEventListener('click', closeMenu);
      mobileMenuBtn.addEventListener('click', toggleMenu);

      // ===== FILE HANDLING =====
      function handleFile(file) {
        if (!file || !file.type.startsWith('video/')) {
          alert('Please select a video file');
          return;
        }

        state.videoFile = file;
        state.videoDate = new Date(file.lastModified);
        
        if (state.videoUrl) {
          URL.revokeObjectURL(state.videoUrl);
        }
        state.videoUrl = URL.createObjectURL(file);

        videoElement.src = state.videoUrl;
        videoElement.load();

        dropZone.classList.add('hidden');
        loadingOverlay.classList.add('visible');
      }

      videoElement.addEventListener('loadedmetadata', () => {
        state.videoDuration = videoElement.duration;
        state.videoWidth = videoElement.videoWidth;
        state.videoHeight = videoElement.videoHeight;

        // Update metadata display
        metaFilename.innerHTML = `<span>${state.videoFile.name}</span>`;
        metaResolution.innerHTML = `<span>${state.videoWidth}×${state.videoHeight}</span>`;
        metaFps.innerHTML = `~<span>${state.videoFps}</span>fps`;
        metaDuration.innerHTML = `<span>${formatTime(state.videoDuration)}</span>`;
        
        if (state.videoDate) {
          metaDate.innerHTML = `<span>${formatDate(state.videoDate)}</span>`;
        }

        // Set aspect ratio CSS variable
        const aspect = state.videoWidth / state.videoHeight;
        framesGrid.style.setProperty('--video-aspect', aspect);

        loadingOverlay.classList.remove('visible');
        generateFrames();
      });

      videoElement.addEventListener('error', () => {
        loadingOverlay.classList.remove('visible');
        alert('Error loading video');
      });

      // Drag & Drop
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        handleFile(file);
      });

      dropZone.addEventListener('click', (e) => {
        if (e.target === browseBtn || e.target.closest('.drop-zone-btn')) return;
        fileInput.click();
      });

      browseBtn.addEventListener('click', () => fileInput.click());
      newVideoBtn.addEventListener('click', () => {
        fileInput.click();
      });

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
      });

      // ===== FRAME GENERATION =====
      async function generateFrames() {
        if (!state.videoUrl) return;

        // Calculate frame times based on mode
        const times = calculateFrameTimes();
        const totalFrames = times.length;

        // Auto-calculate grid columns if auto-fit is on
        if (state.autoFit) {
          state.gridCols = calculateOptimalColumns(totalFrames);
          gridColsInput.value = state.gridCols;
        }

        state.frames = [];
        progressBar.classList.add('visible');
        loadingOverlay.classList.add('visible');

        // Set canvas size
        captureCanvas.width = state.videoWidth;
        captureCanvas.height = state.videoHeight;

        for (let i = 0; i < times.length; i++) {
          const time = times[i];
          const frameData = await captureFrame(time);
          state.frames.push({
            time: time,
            frameNumber: Math.floor(time * state.videoFps),
            dataUrl: frameData
          });

          // Update progress
          const progress = ((i + 1) / times.length) * 100;
          progressFill.style.width = `${progress}%`;
          loadingProgress.textContent = `${i + 1} / ${times.length}`;
        }

        progressBar.classList.remove('visible');
        loadingOverlay.classList.remove('visible');
        progressFill.style.width = '0%';

        renderGrid();
        updateModeDisplay();
        
        if (state.autoFit) {
          fitToScreen();
        }
      }

      function calculateFrameTimes() {
        const times = [];
        const duration = state.videoDuration;

        switch (state.selectionMode) {
          case 'count':
            const count = state.frameCount;
            for (let i = 0; i < count; i++) {
              const time = (duration / (count + 1)) * (i + 1);
              times.push(Math.min(time, duration - 0.1));
            }
            break;

          case 'seconds':
            const secInterval = state.intervalValue;
            let t = 0;
            while (t < duration && times.length < 200) {
              times.push(Math.min(t, duration - 0.1));
              t += secInterval;
            }
            break;

          case 'frames':
            const frameInterval = state.intervalValue;
            const fps = state.videoFps;
            let frame = 0;
            while ((frame / fps) < duration && times.length < 200) {
              times.push(Math.min(frame / fps, duration - 0.1));
              frame += frameInterval;
            }
            break;
        }

        return times;
      }

      function calculateOptimalColumns(totalFrames) {
        // Get available area
        const areaRect = canvasArea.getBoundingClientRect();
        const areaWidth = areaRect.width - 40;
        const areaHeight = areaRect.height - 40;
        const aspect = state.videoWidth / state.videoHeight;

        // Try different column counts and find best fit
        let bestCols = 4;
        let bestFit = 0;

        for (let cols = 1; cols <= Math.min(totalFrames, 16); cols++) {
          const rows = Math.ceil(totalFrames / cols);
          
          // Calculate frame size that fits
          const frameWidth = areaWidth / cols;
          const frameHeight = frameWidth / aspect + (state.showTimecode ? state.fontSize * 2.2 : 0);
          const totalHeight = rows * frameHeight;
          
          const scaleX = areaWidth / (cols * frameWidth);
          const scaleY = areaHeight / totalHeight;
          const scale = Math.min(scaleX, scaleY, 1);
          
          const usedArea = (cols * frameWidth * scale) * (totalHeight * scale);
          const fillRatio = usedArea / (areaWidth * areaHeight);
          
          if (fillRatio > bestFit) {
            bestFit = fillRatio;
            bestCols = cols;
          }
        }

        return bestCols;
      }

      function captureFrame(time) {
        return new Promise((resolve) => {
          videoElement.currentTime = time;
          videoElement.onseeked = () => {
            captureCtx.drawImage(videoElement, 0, 0);
            const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.9);
            resolve(dataUrl);
          };
        });
      }

      function renderGrid() {
        framesGrid.innerHTML = '';
        framesGrid.style.gridTemplateColumns = `repeat(${state.gridCols}, 1fr)`;
        
        // Update CSS variables
        const metaHeight = state.fontSize * 2.2;
        framesGrid.style.setProperty('--meta-height', `${metaHeight}px`);
        framesGrid.style.setProperty('--meta-font-size', `${state.fontSize}px`);

        state.frames.forEach((frame) => {
          const item = document.createElement('div');
          item.className = 'frame-item';

          const imgWrap = document.createElement('div');
          imgWrap.className = 'frame-image-wrap';

          const img = document.createElement('img');
          img.src = frame.dataUrl;
          imgWrap.appendChild(img);

          const meta = document.createElement('div');
          meta.className = 'frame-meta' + (state.showTimecode ? '' : ' hidden');
          meta.textContent = `${formatTime(frame.time)} / F${frame.frameNumber}`;

          item.appendChild(imgWrap);
          item.appendChild(meta);
          framesGrid.appendChild(item);
        });
      }

      // ===== PAN & ZOOM =====
      canvasArea.addEventListener('wheel', (e) => {
        if (e.target.closest('.side-menu')) return;
        e.preventDefault();
        
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const rect = canvasArea.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const newScale = Math.max(0.1, Math.min(10, state.scale * delta));
        const scaleChange = newScale / state.scale;

        state.panX = mouseX - (mouseX - state.panX) * scaleChange;
        state.panY = mouseY - (mouseY - state.panY) * scaleChange;
        state.scale = newScale;

        updateTransform();
      }, { passive: false });

      canvasArea.addEventListener('mousedown', (e) => {
        if (e.target.closest('.drop-zone') || e.target.closest('.side-menu')) return;
        if (e.button !== 0) return; // Only left mouse button
        
        state.isPanning = true;
        state.startMouseX = e.clientX;
        state.startMouseY = e.clientY;
        state.startPanX = state.panX;
        state.startPanY = state.panY;
        canvasArea.style.cursor = 'grabbing';
      });

      window.addEventListener('mousemove', (e) => {
        if (!state.isPanning) return;
        const dx = e.clientX - state.startMouseX;
        const dy = e.clientY - state.startMouseY;
        state.panX = state.startPanX + dx;
        state.panY = state.startPanY + dy;
        updateTransform();
      });

      window.addEventListener('mouseup', () => {
        state.isPanning = false;
        canvasArea.style.cursor = 'grab';
      });

      // Touch support
      let lastTouchDist = 0;

      canvasArea.addEventListener('touchstart', (e) => {
        if (e.target.closest('.drop-zone') || e.target.closest('.side-menu')) return;
        
        if (e.touches.length === 1) {
          state.isPanning = true;
          state.startMouseX = e.touches[0].clientX;
          state.startMouseY = e.touches[0].clientY;
          state.startPanX = state.panX;
          state.startPanY = state.panY;
        } else if (e.touches.length === 2) {
          const dx = e.touches[1].clientX - e.touches[0].clientX;
          const dy = e.touches[1].clientY - e.touches[0].clientY;
          lastTouchDist = Math.hypot(dx, dy);
        }
      }, { passive: false });

      canvasArea.addEventListener('touchmove', (e) => {
        if (e.target.closest('.drop-zone') || e.target.closest('.side-menu')) return;
        e.preventDefault();

        if (e.touches.length === 1 && state.isPanning) {
          const dx = e.touches[0].clientX - state.startMouseX;
          const dy = e.touches[0].clientY - state.startMouseY;
          state.panX = state.startPanX + dx;
          state.panY = state.startPanY + dy;
          updateTransform();
        } else if (e.touches.length === 2) {
          const dx = e.touches[1].clientX - e.touches[0].clientX;
          const dy = e.touches[1].clientY - e.touches[0].clientY;
          const dist = Math.hypot(dx, dy);
          const center = {
            x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
            y: (e.touches[0].clientY + e.touches[1].clientY) / 2
          };

          if (lastTouchDist > 0) {
            const delta = dist / lastTouchDist;
            const rect = canvasArea.getBoundingClientRect();
            const cx = center.x - rect.left;
            const cy = center.y - rect.top;

            const newScale = Math.max(0.1, Math.min(10, state.scale * delta));
            const scaleChange = newScale / state.scale;

            state.panX = cx - (cx - state.panX) * scaleChange;
            state.panY = cy - (cy - state.panY) * scaleChange;
            state.scale = newScale;

            updateTransform();
          }

          lastTouchDist = dist;
        }
      }, { passive: false });

      canvasArea.addEventListener('touchend', () => {
        state.isPanning = false;
        lastTouchDist = 0;
      });

      function updateTransform() {
        canvasInner.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
      }

      function fitToScreen() {
        if (state.frames.length === 0) return;

        const areaRect = canvasArea.getBoundingClientRect();
        const padding = 20;
        const rows = Math.ceil(state.frames.length / state.gridCols);

        // Calculate actual grid dimensions
        const aspect = state.videoWidth / state.videoHeight;
        const metaHeight = state.showTimecode ? state.fontSize * 2.2 : 0;
        const gap = 2;
        
        // Work backwards from available space
        const availableWidth = areaRect.width - padding * 2;
        const availableHeight = areaRect.height - padding * 2;
        
        // Calculate frame size based on fitting
        const maxFrameWidth = availableWidth / state.gridCols;
        const maxFrameHeight = (availableHeight / rows) - metaHeight;
        
        // Use the smaller dimension to maintain aspect ratio
        let frameWidth, frameHeight;
        if (maxFrameWidth / aspect <= maxFrameHeight) {
          frameWidth = maxFrameWidth;
          frameHeight = frameWidth / aspect;
        } else {
          frameHeight = maxFrameHeight;
          frameWidth = frameHeight * aspect;
        }
        
        const gridWidth = state.gridCols * frameWidth + (state.gridCols - 1) * gap;
        const gridHeight = rows * (frameHeight + metaHeight) + (rows - 1) * gap;

        state.scale = 1;
        state.panX = (areaRect.width - gridWidth) / 2;
        state.panY = (areaRect.height - gridHeight) / 2;

        // Apply size to frames
        framesGrid.style.width = `${gridWidth}px`;
        
        updateTransform();
      }

      // ===== MENU CONTROLS =====
      gridColsInput.addEventListener('change', () => {
        state.gridCols = parseInt(gridColsInput.value) || 6;
        state.autoFit = false;
        toggleAutoFit.classList.remove('active');
        if (state.frames.length > 0) {
          renderGrid();
        }
      });

      selectionModeSelect.addEventListener('change', () => {
        state.selectionMode = selectionModeSelect.value;
        updateIntervalUI();
      });

      frameCountInput.addEventListener('change', () => {
        state.frameCount = parseInt(frameCountInput.value) || 24;
      });

      intervalValueInput.addEventListener('change', () => {
        state.intervalValue = parseInt(intervalValueInput.value) || 1;
      });

      function updateIntervalUI() {
        if (state.selectionMode === 'count') {
          countRow.style.display = 'flex';
          intervalRow.style.display = 'none';
        } else {
          countRow.style.display = 'none';
          intervalRow.style.display = 'flex';
          intervalLabel.textContent = state.selectionMode === 'seconds' ? 'Seconds' : 'Frames';
        }
      }

      toggleMetadata.addEventListener('click', () => {
        state.showMetadata = !state.showMetadata;
        toggleMetadata.classList.toggle('active', state.showMetadata);
        metadataBar.classList.toggle('hidden', !state.showMetadata);
      });

      toggleTimecode.addEventListener('click', () => {
        state.showTimecode = !state.showTimecode;
        toggleTimecode.classList.toggle('active', state.showTimecode);
        document.querySelectorAll('.frame-meta').forEach(el => {
          el.classList.toggle('hidden', !state.showTimecode);
        });
        if (state.autoFit) fitToScreen();
      });

      toggleAutoFit.addEventListener('click', () => {
        state.autoFit = !state.autoFit;
        toggleAutoFit.classList.toggle('active', state.autoFit);
      });

      fontSizeSlider.addEventListener('input', () => {
        state.fontSize = parseInt(fontSizeSlider.value);
        fontSizeValue.textContent = `${state.fontSize}px`;
        
        const metaHeight = state.fontSize * 2.2;
        framesGrid.style.setProperty('--meta-height', `${metaHeight}px`);
        framesGrid.style.setProperty('--meta-font-size', `${state.fontSize}px`);
      });

      bgColorInput.addEventListener('input', () => {
        state.bgColor = bgColorInput.value;
        app.style.setProperty('--bg-color', state.bgColor);
      });

      generateBtn.addEventListener('click', () => {
        generateFrames();
      });

      fitScreenBtn.addEventListener('click', () => {
        fitToScreen();
      });

      exportPngBtn.addEventListener('click', () => exportImage('png', false));
      exportJpgBtn.addEventListener('click', () => exportImage('jpeg', true));

      // ===== EXPORT =====
      function exportImage(format, small) {
        if (state.frames.length === 0) return;

        const maxSize = small ? 2048 : 8192;
        const quality = small ? 0.85 : 0.95;
        
        // Calculate dimensions
        const rows = Math.ceil(state.frames.length / state.gridCols);
        const aspect = state.videoWidth / state.videoHeight;
        const metaHeight = state.showTimecode ? 28 : 0;
        const headerHeight = state.showMetadata ? 40 : 0;
        const gap = 2;

        // Start with ideal frame width
        let frameWidth = small ? 200 : 400;
        let frameHeight = frameWidth / aspect;
        
        let totalWidth = state.gridCols * frameWidth + (state.gridCols - 1) * gap;
        let totalHeight = headerHeight + rows * (frameHeight + metaHeight) + (rows - 1) * gap;

        // Scale down if needed
        if (small) {
          const maxDim = Math.max(totalWidth, totalHeight);
          if (maxDim > maxSize) {
            const scale = maxSize / maxDim;
            frameWidth *= scale;
            frameHeight *= scale;
            totalWidth = state.gridCols * frameWidth + (state.gridCols - 1) * gap;
            totalHeight = headerHeight + rows * (frameHeight + metaHeight * scale) + (rows - 1) * gap;
          }
        }

        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = Math.round(totalWidth);
        exportCanvas.height = Math.round(totalHeight);
        const ctx = exportCanvas.getContext('2d');

        // Background
        ctx.fillStyle = state.bgColor;
        ctx.fillRect(0, 0, totalWidth, totalHeight);

        // Header
        if (state.showMetadata) {
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, totalWidth, headerHeight);
          ctx.fillStyle = '#35f2a3';
          ctx.fillRect(12, 16, 8, 8);
          ctx.fillStyle = '#fff';
          ctx.font = '600 14px system-ui';
          ctx.fillText('FRAMEGRID', 28, 24);
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.font = '12px system-ui';
          const dateStr = state.videoDate ? ` · ${formatDate(state.videoDate)}` : '';
          const info = `${state.videoFile?.name || 'video'} · ${state.videoWidth}×${state.videoHeight} · ${formatTime(state.videoDuration)}${dateStr} · ${getModeText()}`;
          ctx.fillText(info, 120, 24);
        }

        // Frames
        const loadPromises = state.frames.map((frame, i) => {
          return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              const col = i % state.gridCols;
              const row = Math.floor(i / state.gridCols);
              const x = col * (frameWidth + gap);
              const y = headerHeight + row * (frameHeight + metaHeight + gap);

              ctx.drawImage(img, x, y, frameWidth, frameHeight);

              if (state.showTimecode) {
                const mh = small ? metaHeight * 0.7 : metaHeight;
                ctx.fillStyle = '#000';
                ctx.fillRect(x, y + frameHeight, frameWidth, mh);
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = `${small ? 9 : 11}px system-ui`;
                ctx.textAlign = 'center';
                const tc = `${formatTime(frame.time)} / F${frame.frameNumber}`;
                ctx.fillText(tc, x + frameWidth / 2, y + frameHeight + mh * 0.7);
                ctx.textAlign = 'left';
              }
              resolve();
            };
            img.src = frame.dataUrl;
          });
        });

        Promise.all(loadPromises).then(() => {
          const link = document.createElement('a');
          const ext = format === 'jpeg' ? 'jpg' : 'png';
          const suffix = small ? '_small' : '';
          link.download = `framegrid_${state.videoFile?.name || 'export'}${suffix}.${ext}`;
          link.href = exportCanvas.toDataURL(`image/${format}`, quality);
          link.click();
        });
      }

      // ===== UTILITIES =====
      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }

      function formatDate(date) {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        return `${d}.${m}.${y}`;
      }

      function getModeText() {
        switch (state.selectionMode) {
          case 'count': return `${state.frameCount} frames`;
          case 'seconds': return `every ${state.intervalValue}s`;
          case 'frames': return `every ${state.intervalValue} frames`;
        }
      }

      function updateModeDisplay() {
        metaMode.innerHTML = `<span>${getModeText()}</span>`;
      }

      // ===== INIT =====
      updateIntervalUI();
      app.style.setProperty('--bg-color', state.bgColor);
      fontSizeValue.textContent = `${state.fontSize}px`;

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeMenu();
        }
        if ((e.key === 'f' || e.key === 'F') && !e.target.matches('input')) {
          fitToScreen();
        }
        if ((e.key === 'm' || e.key === 'M') && !e.target.matches('input')) {
          toggleMenu();
        }
      });

      // Window resize
      window.addEventListener('resize', () => {
        if (state.autoFit && state.frames.length > 0) {
          fitToScreen();
        }
      });

    })();
  </script>
</body>
</html>
